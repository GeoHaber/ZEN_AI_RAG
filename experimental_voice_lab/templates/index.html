<!DOCTYPE html>
<html>

<head>
    <title>Voice Lab (Minimal)</title>
    <style>
        body {
            font-family: monospace;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
        }

        .box {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ddd;
        }

        button {
            padding: 10px;
            cursor: pointer;
            font-size: 1.1em;
        }

        .log {
            background: #f0f0f0;
            padding: 10px;
            height: 150px;
            overflow-y: scroll;
            white-space: pre-wrap;
            font-size: 0.9em;
        }

        .red {
            color: red;
        }

        .green {
            color: green;
        }

        #status-indicator {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>🎙️ Voice Lab (Simple)</h1>

    <div class="box">
        <div>Server Status: <span id="status-indicator" class="red">OFFLINE</span> (Port 8005)</div>
        <button onclick="testConnection()">🔄 Check Connection</button>
        <div style="margin-top: 10px;">
            <label>🎙️ Input Device:</label>
            <select id="mic-select" style="padding: 5px; width: 200px;"></select>
        </div>
        <div style="margin-top: 10px;">
            <label>🔊 Output Device:</label>
            <select id="spk-select" style="padding: 5px; width: 200px;"></select>
            <button onclick="testSpeaker()" style="font-size: 0.8em;">🔈 Test</button>
            <button onclick="testLoopback()" style="font-size: 0.8em; background:#dbeafe; color:#1e40af;">🔁 Loopback
                Check</button>
            <button onclick="loadDevices()" style="font-size: 0.8em; margin-left:10px;">🔄 Refresh List</button>
        </div>
    </div>

    <div class="box">
        <h3>TTS Settings 🗣️</h3>
        <div style="margin-bottom: 10px;">
            <label>Voice:</label>
            <select id="voice-select" style="padding: 5px; max-width: 200px;"></select>
        </div>
        <div style="display: flex; gap: 20px;">
            <div>
                <label>Pitch:</label>
                <input type="range" id="pitch-slider" min="0.5" max="2" step="0.1" value="1">
                <span id="pitch-val">1.0</span>
            </div>
            <div>
                <label>Speed:</label>
                <input type="range" id="rate-slider" min="0.5" max="2" step="0.1" value="1">
                <span id="rate-val">1.0</span>
            </div>
        </div>
        <div style="margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px;">
            <label style="font-weight: bold; color: #dc2626;">🔥 Conversation Mode:</label>
            <input type="checkbox" id="conv-mode-toggle" style="transform: scale(1.5); margin-left: 10px;">
            <span style="font-size: 0.9em; color: #666;">(Hands-Free Loop)</span>
        </div>
    </div>

    <div class="box">
        <h3>Chat Area</h3>
        <div id="chat-history" style="min-height: 50px; margin-bottom: 10px;"></div>

        <div style="display: flex; gap: 10px;">
            <button id="record-btn" onclick="toggleRecording()">🎤 Record</button>
            <input type="text" id="user-input" placeholder="Or type here..." style="flex:1; padding:10px;">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <div class="box">
        <h4>System Logs:</h4>
        <div id="logs" class="log"></div>
    </div>

    <script>
        const logDiv = document.getElementById('logs');
        const statusEl = document.getElementById('status-indicator');
        const recordBtn = document.getElementById('record-btn');
        const chatDiv = document.getElementById('chat-history');
        const inputEl = document.getElementById('user-input');

        const micSelect = document.getElementById('mic-select');
        const spkSelect = document.getElementById('spk-select');

        function log(msg) {
            logDiv.innerText += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function loadDevices() {
            try {
                const res = await fetch('/api/devices');
                const data = await res.json();
                micSelect.innerHTML = '';
                spkSelect.innerHTML = '';

                // Inputs
                if (data.inputs && data.inputs.length > 0) {
                    data.inputs.forEach(d => {
                        const opt = document.createElement('option');
                        opt.value = d.id;
                        opt.innerText = d.name;
                        micSelect.appendChild(opt);
                    });
                }

                // Outputs
                if (data.outputs && data.outputs.length > 0) {
                    data.outputs.forEach(d => {
                        const opt = document.createElement('option');
                        opt.value = d.id;
                        opt.innerText = d.name;
                        spkSelect.appendChild(opt);
                    });
                }

                log(`Devices Loaded: ${data.inputs.length} Inputs, ${data.outputs.length} Outputs.`);
            } catch (e) {
                log("❌ Failed to list devices: " + e);
            }
        }

        async function testSpeaker() {
            const devId = spkSelect.value;
            log(`Testing Speaker (ID ${devId})...`);
            try {
                const res = await fetch('/api/test-audio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: devId })
                });
                const data = await res.json();
                if (data.status === 'ok') log("✅ Tone Played.");
                else log("❌ Playback Error: " + data.msg);
            } catch (e) {
                log("❌ API Error: " + e);
            }
        }

        async function testLoopback() {
            const inId = micSelect.value;
            const outId = spkSelect.value;
            log(`🔄 STARTING LOOPBACK (In:${inId}, Out:${outId})...`);
            log("🛑 KEEP QUIET - Playing Tone & Listening...");

            try {
                const res = await fetch('/api/test-loopback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input_id: inId, output_id: outId })
                });
                const data = await res.json();

                if (data.status === 'ok' && data.success) {
                    log(`✅ PASSED: Loopback Signal Detected! (Mag: ${data.magnitude.toFixed(1)})`);
                    log("ℹ️ This confirms your Mic can hear your Speaker.");
                } else if (data.status === 'error') {
                    log("❌ Error: " + data.msg);
                } else {
                    const mag = data.magnitude ? data.magnitude.toFixed(1) : "0.0";
                    log(`❌ FAILED: Signal too weak. (Mag: ${mag})`);
                    log("ℹ️ Increase Volume or Move Mic closer to Speaker.");
                }
            } catch (e) {
                log("❌ Test Failed: " + e);
            }
        }

        async function testConnection() {
            // log("Testing connection to Backend...");
            statusEl.innerText = "CHECKING...";
            try {
                const res = await fetch('/api/test-llm');
                const data = await res.json();
                if (data.success) {
                    statusEl.innerText = "ONLINE";
                    statusEl.className = "green";
                    log("✅ Backend Connected!");
                    // Also refresh devices/voices once connected
                    loadDevices();
                    populateVoices();
                } else {
                    throw new Error("API reported failure");
                }
            } catch (e) {
                statusEl.innerText = "OFFLINE (Retrying...)";
                statusEl.className = "red";
                // log("❌ Connection Failed. Retrying in 3s...");
                setTimeout(testConnection, 3000); // Auto Retry
            }
        }

        async function toggleRecording() {
            if (recordBtn.innerText.includes("Stop")) return;

            recordBtn.innerText = "🛑 Recording... (3s)";
            recordBtn.style.background = "#ffcccc";
            const devId = micSelect.value;
            const devName = micSelect.options[micSelect.selectedIndex]?.text || "Default";

            log(`Started Recording (Mic: ${devName})...`);

            try {
                const res = await fetch('/api/record', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: devId })
                });
                const data = await res.json();

                recordBtn.innerText = "🎤 Record";
                recordBtn.style.background = "";

                if (data.text) {
                    log(`✅ Transcribed: "${data.text}"`);
                    inputEl.value = data.text;
                    sendMessage(); // Auto-send
                } else {
                    log("⚠️ No speech detected.");
                }
            } catch (e) {
                log("❌ Recording Error: " + e);
                recordBtn.innerText = "🎤 Record";
                recordBtn.style.background = "";
            }
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            // UI Update
            chatDiv.innerHTML += `<div><b>You:</b> ${text}</div>`;
            inputEl.value = '';

            log(`Sending: "${text}"`);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();


                chatDiv.innerHTML += `<div><b>Quen (${data.emotion}):</b> ${data.response}</div>`;
                log(`Received: [${data.emotion}] ${data.response}`);

                // Speak Response
                speakResponse(data.response, data.emotion);

            } catch (e) {
                log("❌ Chat Error: " + e);
            }
        }

        const voiceSelect = document.getElementById('voice-select');
        const pitchSlider = document.getElementById('pitch-slider');
        const rateSlider = document.getElementById('rate-slider');

        // Slider Value Updates
        pitchSlider.oninput = () => document.getElementById('pitch-val').innerText = pitchSlider.value;
        rateSlider.oninput = () => document.getElementById('rate-val').innerText = rateSlider.value;

        async function populateVoices() {
            try {
                // Fetch Edge Neural Voices from Backend
                const res = await fetch('/api/tts-voices');
                const data = await res.json();

                voiceSelect.innerHTML = '';

                // Add Edge Voices
                if (data.voices) {
                    const group = document.createElement('optgroup');
                    group.label = "✨ Neural Cloud Voices (High Quality)";
                    data.voices.forEach(v => {
                        const opt = document.createElement('option');
                        opt.value = v.id;
                        opt.text = `${v.name} (${v.gender})`;
                        if (v.id === 'en-US-AriaNeural') opt.selected = true;
                        group.appendChild(opt);
                    });
                    voiceSelect.appendChild(group);
                }

                // Add Browser Fallback
                const browserGroup = document.createElement('optgroup');
                browserGroup.label = "💻 Browser Local Voices";
                window.speechSynthesis.getVoices().forEach((v, i) => {
                    const opt = document.createElement('option');
                    opt.value = "browser:" + i; // Flag as browser
                    opt.text = `[Local] ${v.name}`;
                    browserGroup.appendChild(opt);
                });
                voiceSelect.appendChild(browserGroup);

            } catch (e) {
                log("❌ Failed to load TTS voices: " + e);
            }
        }

        // Init Voices (Wait for browser voices too)
        window.speechSynthesis.onvoiceschanged = populateVoices;
        populateVoices();

        async function speakResponse(text, emotion) {
            const selectedVoice = voiceSelect.value;
            const convMode = document.getElementById('conv-mode-toggle').checked;

            const onSpeechEnd = () => {
                log("✅ Speech finished.");
                if (convMode) {
                    log("🔄 Conversation Loop: Listening in 1s...");
                    setTimeout(() => toggleRecording(), 1000);
                }
            };

            // 1. Browser Native Fallback
            if (selectedVoice.startsWith("browser:")) {
                if (!('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);

                // Minimal Tweaks
                let rate = parseFloat(rateSlider.value);
                if (emotion.includes("Happy")) rate *= 1.1;
                utterance.rate = rate;

                // Find voice
                const idx = parseInt(selectedVoice.split(":")[1]);
                const voices = window.speechSynthesis.getVoices();
                if (voices[idx]) utterance.voice = voices[idx];

                utterance.onend = onSpeechEnd;

                log(`🗣️ Speaking (Browser Local)...`);
                window.speechSynthesis.speak(utterance);
                return;
            }

            // 2. High Quality Edge TTS (Default)
            log(`☁️ Generating Neural Audio (${selectedVoice})...`);
            try {
                const res = await fetch('/api/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, voice_id: selectedVoice })
                });
                const data = await res.json();

                if (data.status === 'ok') {
                    const audio = new Audio(data.url);
                    audio.onended = onSpeechEnd;
                    audio.play();
                    log(`▶️ Playing Neural Audio.`);
                } else {
                    log(`❌ TTS Error: ${data.msg}`);
                }
            } catch (e) {
                log(`❌ TTS Req Error: ${e}`);
            }
        }

        // Output Device Selector Change
        // Note: Browser TTS usually plays on Default System Output.
        // Changing 'spk-select' here only affects the backend Test Tone.
        spkSelect.addEventListener('change', () => {
            log("ℹ️ Note: Browser TTS always plays on System Default Speaker.");
        });

        // Init
        testConnection();
        // Pre-load voices
        // window.speechSynthesis.onvoiceschanged = () => {
        //     const voices = window.speechSynthesis.getVoices();
        //     // log(`TTS Voices Loaded: ${voices.length}`);
        // };
    </script>
</body>

</html>
