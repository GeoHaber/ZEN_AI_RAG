[pytest]
testpaths = tests
norecursedirs = tests/scripts
python_files = test_*.py Test_*.py benchmark_*.py smoke_*.py verify_*.py stress_*.py
python_classes = Test*
python_functions = test_*

# Add markers for slow vs fast tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    ui: marks tests as UI tests
    monkey: marks monkey/chaos/fuzz tests

# Console output format
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for individual tests (requires pytest-timeout)
timeout = 30

# Ignore depreciation warnings if they clutter output
filterwarnings =
    ignore::DeprecationWarning
    ignore::RuntimeWarning

# Asyncio
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
